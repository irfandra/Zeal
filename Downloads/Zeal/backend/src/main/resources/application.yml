spring:
  application:
    name: digital-seal-backend

  datasource:
    url: jdbc:mysql://mysql:3306/digital_seal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${DATABASE_MODE:validate}
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true


app:
  verification:
    code-expiry-minutes: 10
    max-attempts: 5
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:noreply@digitalseal.com}}
    from-name: Digital Seal
    platform-recipient: ${PLATFORM_QR_EMAIL:${MAIL_FROM:${MAIL_USERNAME:noreply@digitalseal.com}}}
    qr-batch:
      max-attachments: ${QR_BATCH_MAX_ATTACHMENTS:120}
  frontend:
    reset-password-deeplink: ${FRONTEND_RESET_PASSWORD_DEEPLINK:zeal://changepassword}


jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 2592000000 # 30 days in milliseconds


web3:
  rpc:
    url: ${WEB3_RPC_URL:${POLYGON_LIKE_RPC_URL:http://hardhat:8545}}
  contract:
    address: ${CONTRACT_ADDRESS:}
  private:
    key: ${PRIVATE_KEY:}
  brand:
    private-keys: ${WEB3_BRAND_PRIVATE_KEYS:}
  estimate:
    april-first-polygon-gas-price-wei: ${WEB3_ESTIMATE_APRIL_FIRST_POLYGON_GAS_PRICE_WEI:30000000000}


cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8081,http://192.168.1.2:8080}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api/v1


springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: false

management:
  health:
    mail:
      enabled: false # mail SMTP not available in dev; don't fail the health check
  endpoint:
    health:
      show-details: always

security:
  dev-auth-bypass-enabled: ${SECURITY_DEV_AUTH_BYPASS_ENABLED:false}

logging:
  file:
    name: logs/digital-seal.log
  pattern:

    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level --- %msg%n"

    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level --- %msg%n"
  level:
    "[com.digitalseal]": INFO
    "[org.springframework.security]": WARN
    "[org.hibernate.SQL]": WARN
    "[org.flywaydb]": INFO
